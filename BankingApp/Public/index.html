<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banking App</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div style="text-align: center; margin-bottom: 20px;">
            <svg width="70" height="90" viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg" style="display: inline-block;">
                <!-- Indigenous-inspired feather logo for Manitoba -->
                <!-- Main feather shaft -->
                <path d="M 40 10 Q 38 35 40 60 Q 42 35 40 10" fill="none" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round"/>
                <!-- Left feather lines (indigenous geometric pattern) -->
                <path d="M 40 20 Q 30 22 28 25" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M 40 30 Q 25 32 22 38" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M 40 40 Q 20 42 16 50" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M 40 50 Q 24 52 20 62" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
                <!-- Right feather lines -->
                <path d="M 40 20 Q 50 22 52 25" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M 40 30 Q 55 32 58 38" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M 40 40 Q 60 42 64 50" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M 40 50 Q 56 52 60 62" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
                <!-- Feather tip accent (indigenous dot pattern) -->
                <circle cx="40" cy="68" r="3" fill="#c9a84c" opacity="0.8"/>
                <circle cx="35" cy="65" r="2" fill="#c9a84c" opacity="0.6"/>
                <circle cx="45" cy="65" r="2" fill="#c9a84c" opacity="0.6"/>
            </svg>
        </div>
        <h1>Welcome to the Banking App Auto Deploy</h1>

        <!-- Login/Register Section -->
        <div id="auth-section">
            <h2>Login or Register</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button id="login-btn">Login</button>
            <button id="register-btn">Register</button>
            <p id="auth-message"></p>
        </div>

        <!-- Banking Section (Visible after login) -->
        <div id="banking-section" style="display: none;">
            <h2>Banking Operations</h2>
            <p>Balance: <span id="balance">$0.00 CAD</span></p>
            <input type="number" id="amount" placeholder="Amount in CAD">
            <button id="deposit-btn">Deposit</button>
            <button id="withdraw-btn">Withdraw</button>
            <button id="logout-btn">Logout</button>
            <p id="operation-message"></p>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
